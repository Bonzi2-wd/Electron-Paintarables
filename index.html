<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelStudio Pro - Wood Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #3a6ea5;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
            font-family: "Tahoma", "Segoe UI", sans-serif;
            transition: background-image 0.3s ease-in-out;
            user-select: none;
            background-image: url('https://i.postimg.cc/hfr3mtyg/beautiful-wood-background-with-text-space-free-vector.jpg');
        }

        canvas {
            image-rendering: pixelated;
            touch-action: none;
            background-color: #fff; 
            border: 6px solid #4e342e;
            cursor: crosshair;
            display: block;
            box-shadow: 0 15px 40px rgba(0,0,0,0.7);
            transition: transform 0.2s ease;
        }

        .xp-header {
            background: linear-gradient(to bottom, #0058e4 0%, #3b8cf8 10%, #1e79f5 50%, #0867f1 85%, #0058e4 100%);
            border-bottom: 2px solid #003096;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.4);
        }

        .xp-button {
            background: linear-gradient(to bottom, #eeeeee 0%, #cccccc 100%);
            border: 1px solid #707070;
            box-shadow: inset 0 1px 0 white;
            transition: all 0.05s;
            cursor: pointer;
            border-radius: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            min-width: 40px;
        }

        .xp-button:hover { background: linear-gradient(to bottom, #fff 0%, #ddd 100%); }

        .xp-button:active, .xp-button.active {
            background: linear-gradient(to bottom, #f29631 0%, #f9bb6e 100%) !important;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.4);
            border-color: #b35b00;
        }

        .xp-panel {
            background: #f0f0f0;
            border: 2px solid #0058e4;
            border-radius: 4px;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
        }

        .xp-window-title {
            background: linear-gradient(to right, #0058e4, #3b8cf8);
            color: white;
            font-weight: bold;
            font-size: 11px;
            padding: 4px 8px;
            text-shadow: 1px 1px 1px rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #fileMenu {
            position: absolute;
            top: 56px;
            left: 8px;
            width: 200px;
            background: white;
            border: 1px solid #003096;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .menu-item {
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            color: #000;
        }
        .menu-item:hover {
            background-color: #316ac5;
            color: white;
        }

        .audio-marker {
            position: absolute;
            pointer-events: none;
            width: 14px;
            height: 14px;
            background: #facc15; 
            border: 2px solid #000;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px rgba(250, 204, 21, 0.8);
            z-index: 99;
        }

        .pencil-green { filter: hue-rotate(90deg) saturate(1.5); }
        .pencil-blue { filter: hue-rotate(180deg) saturate(1.2); }

        #grid-overlay {
            pointer-events: none;
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 8px 8px;
            display: none;
        }

        #calendarModal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            z-index: 200;
            display: none;
        }

        .palette-chip {
            width: 20px;
            height: 20px;
            border-radius: 2px;
            border: 1px solid rgba(0,0,0,0.2);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="fixed top-0 left-0 w-full h-full flex flex-col">
    <!-- XP Bar -->
    <div class="xp-header p-1 flex items-center justify-between h-14 z-50">
        <div class="flex items-center gap-3">
            <img src="https://i.postimg.cc/FK7V4fT0/gimppaintpalette-gimp-pintura-11163.png" class="w-8 h-8 ml-2" alt="App Icon">
            
            <button id="fileBtn" class="px-5 py-1 bg-[#2b78e4] text-white font-bold rounded border border-white/30 shadow-sm">File</button>
            <div class="flex items-center gap-2 bg-black/20 p-1 px-2 rounded">
                <input type="color" id="colorPicker" value="#0000ff" class="w-8 h-8 cursor-pointer border-none bg-transparent">
            </div>
        </div>
        <div class="flex items-center gap-3 mr-4">
            <div id="audio-status" class="hidden text-green-300 text-[10px] font-bold">● AUDIO CONNECTED</div>
            <div id="msg" class="text-white text-xs opacity-0 transition-opacity font-bold bg-blue-600/50 px-2 py-1 rounded">Updated</div>
        </div>
    </div>

    <!-- Dropdown -->
    <div id="fileMenu" class="hidden">
        <div class="menu-item" onclick="resetCanvas()">New Project</div>
        <div class="menu-item" onclick="saveArt()">Save Image</div>
        <div class="h-px bg-gray-200 my-1"></div>
        <div class="px-3 py-1 text-[9px] text-gray-400 font-bold uppercase">Backgrounds</div>
        <div class="menu-item" onclick="updateTheme('wood')">Premium Wood</div>
        <div class="menu-item" onclick="updateTheme('studio')">Empty Studio</div>
        <div class="menu-item" onclick="updateTheme('bliss')">XP Bliss</div>
    </div>

    <div class="flex-grow flex flex-col md:flex-row p-4 gap-4 overflow-hidden">
        <!-- Toolbar -->
        <div class="xp-panel w-full md:w-20 flex md:flex-col overflow-hidden shrink-0">
            <div class="xp-window-title hidden md:block"><span>Tools</span></div>
            <div class="p-2 flex flex-row md:flex-col gap-2 overflow-x-auto items-center">
                
                <button onclick="changeTool('brush')" id="btn-brush" class="xp-button p-1 active" title="Pencil">
                    <img src="https://i.postimg.cc/SXRMdkWd/edit-pencil-write-1574.webp" class="w-8 h-8 pencil-green">
                </button>

                <!-- PINK EDIT TEXT PENCIL -->
                <button onclick="changeTool('text')" id="btn-text" class="xp-button p-1" title="Edit Text Pencil">
                    <img src="https://i.postimg.cc/bZ4r6R6y/27-Edit-Text-256x256-35395.png" class="w-8 h-8">
                </button>

                <!-- TEXT LOGO TOOL -->
                <button onclick="changeTool('text')" id="btn-text-logo" class="xp-button p-1" title="Text Tool">
                    <img src="https://i.postimg.cc/mPKkdSdb/text-30837.png" class="w-8 h-8">
                </button>

                <button onclick="changeTool('dither')" id="btn-dither" class="xp-button p-1" title="Dither Brush">
                    <img src="https://i.postimg.cc/SXRMdkWd/edit-pencil-write-1574.webp" class="w-8 h-8 pencil-blue">
                </button>
                
                <button onclick="changeTool('fill')" id="btn-fill" class="xp-button p-1" title="Fill Bucket">
                    <img src="https://i.postimg.cc/qtq3w48n/paint-brush-19677.png" class="w-8 h-8">
                </button>
                
                <button onclick="changeTool('eraser')" id="btn-eraser" class="xp-button p-1" title="Eraser">
                    <img src="https://i.postimg.cc/GBtyKdkM/1487718964-eraser-81704.png" class="w-8 h-8">
                </button>
                
                <div class="h-10 w-px md:h-px md:w-12 bg-gray-400 my-1"></div>
                
                <button onclick="changeTool('audio')" id="btn-audio" class="xp-button p-1" title="Sound Nodes">
                    <img src="https://i.postimg.cc/67qvctdb/editnote-pencil-edi-6175.png" class="w-8 h-8">
                </button>
                
                <button onclick="openAudio()" class="xp-button p-1" title="Import Audio">
                    <img src="https://i.postimg.cc/wMLkr76k/windows-15526.png" class="w-7 h-7">
                </button>
                <input type="file" id="audLoader" accept="audio/*" class="hidden">
                
                <button onclick="changeTool('play')" id="btn-play" class="xp-button p-1" title="Play Sound">
                    <img src="https://i.postimg.cc/t45ByZF3/windowsmedia-21843.webp" class="w-7 h-7">
                </button>

                <div class="h-10 w-px md:h-px md:w-12 bg-gray-400 my-1"></div>

                <button onclick="toggleCalendar()" id="btn-reset" class="xp-button p-1" title="Organizer">
                    <img src="https://i.postimg.cc/PLJwyTmF/organizer-calendar-clock-pencil-10047.png" class="w-8 h-8">
                </button>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="flex-grow flex items-center justify-center overflow-auto relative">
            <div id="canvas-container" class="relative inline-block">
                <canvas id="c" width="64" height="64" style="width: 512px; height: 512px;"></canvas>
                <div id="grid-overlay" class="absolute top-0 left-0 w-full h-full"></div>
                <div id="audioLayer" class="absolute top-0 left-0 w-full h-full pointer-events-none z-10"></div>
            </div>
        </div>

        <!-- Right Panel (Original Properties Restored) -->
        <div class="xp-panel w-full md:w-64 flex flex-col shrink-0">
            <div class="xp-window-title"><span>Properties</span></div>
            <div class="p-3 space-y-4 overflow-y-auto text-[11px]">
                
                <div class="space-y-1">
                    <div class="text-[9px] font-bold text-gray-500 uppercase flex justify-between">
                        <span>Zoom Level</span> <span id="zoom-val">100%</span>
                    </div>
                    <input type="range" id="zoomRange" min="200" max="800" step="50" value="512" class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer">
                </div>

                <div class="space-y-2">
                    <div class="text-[9px] font-bold text-gray-500 uppercase">Swatches</div>
                    <div class="flex flex-wrap gap-1">
                        <div class="palette-chip" style="background: #000000" onclick="setQuickColor('#000000')"></div>
                        <div class="palette-chip" style="background: #ffffff" onclick="setQuickColor('#ffffff')"></div>
                        <div class="palette-chip" style="background: #ff0000" onclick="setQuickColor('#ff0000')"></div>
                        <div class="palette-chip" style="background: #00ff00" onclick="setQuickColor('#00ff00')"></div>
                        <div class="palette-chip" style="background: #0000ff" onclick="setQuickColor('#0000ff')"></div>
                        <div class="palette-chip" style="background: #ffff00" onclick="setQuickColor('#ffff00')"></div>
                        <div class="palette-chip" style="background: #ff00ff" onclick="setQuickColor('#ff00ff')"></div>
                        <div class="palette-chip" style="background: #00ffff" onclick="setQuickColor('#00ffff')"></div>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="text-[9px] font-bold text-gray-500 uppercase">Canvas Actions</div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="flipCanvas()" class="xp-button text-[10px] font-bold py-2">Flip Horiz</button>
                        <button onclick="rotateCanvas()" class="xp-button text-[10px] font-bold py-2">Rotate 90</button>
                        <button onclick="toggleGrid()" id="gridBtn" class="xp-button text-[10px] font-bold py-2">Grid: Off</button>
                        <button onclick="resetCanvas()" class="xp-button text-[10px] font-bold py-2 text-red-600">Clear</button>
                    </div>
                </div>

                <div class="space-y-2">
                    <div class="text-[9px] font-bold text-gray-500 uppercase">Filters</div>
                    <div class="flex gap-2">
                        <button onclick="applyFilter('grey')" class="xp-button flex-1 text-[10px] font-bold py-2">Grayscale</button>
                        <button onclick="applyFilter('invert')" class="xp-button flex-1 text-[10px] font-bold py-2">Invert</button>
                    </div>
                </div>

                <div class="mt-4 p-2 bg-blue-50 border border-blue-200 rounded text-[10px] text-blue-800 leading-tight">
                    <strong>Quick Tip:</strong> Use the <i>Dither Brush</i> (blue pencil) to create retro shading patterns.
                </div>
            </div>
            <div class="mt-auto p-2 bg-gray-200 text-[10px] font-mono border-t border-gray-300">
                TOOL: <span id="mode-text">BRUSH</span>
            </div>
        </div>
    </div>
</div>

<!-- Calendar Modal -->
<div id="calendarModal" class="xp-panel">
    <div class="xp-window-title"><span>Project Organizer</span></div>
    <div class="p-4 flex flex-col gap-4 text-xs">
        <div class="bg-white border-2 border-inset p-2 text-center">
            <div id="cal-date" class="font-bold text-blue-800"></div>
            <div id="cal-time" class="text-lg font-mono"></div>
        </div>
        <div id="cal-grid" class="grid grid-cols-7 gap-1 text-[10px] text-center font-bold"></div>
        <button onclick="resetCanvas(); toggleCalendar();" class="xp-button w-full mt-2 font-bold text-red-700 bg-red-50">
            Clear Project Canvas
        </button>
    </div>
</div>

<script>
    var G = 64;
    var tool = 'brush', drawing = false;
    var aCtx = null, aBuf = null, nodes = [];
    
    var c = document.getElementById('c');
    var ctx = c.getContext('2d', { willReadFrequently: true });
    var layer = document.getElementById('audioLayer');
    var loader = document.getElementById('audLoader');
    var menu = document.getElementById('fileMenu');

    function start() {
        ctx.fillStyle = "#fff";
        ctx.fillRect(0,0,G,G);

        var getPos = (e) => {
            var r = c.getBoundingClientRect();
            var s = G / r.width;
            var x = (e.touches ? e.touches[0].clientX : e.clientX);
            var y = (e.touches ? e.touches[0].clientY : e.clientY);
            return { x: Math.floor((x - r.left) * s), y: Math.floor((y - r.top) * s) };
        };

        var onStart = (e) => {
            if (e.touches) e.preventDefault();
            var pos = getPos(e);
            
            if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (aCtx.state === 'suspended') aCtx.resume();

            if (tool === 'play') { playNode(pos.x, pos.y); return; }
            if (tool === 'audio') { addNode(pos.x, pos.y); return; }
            if (tool === 'fill') { flood(pos.x, pos.y); return; }
            if (tool === 'text') { placeText(pos.x, pos.y); return; }
            
            drawing = true;
            draw(pos.x, pos.y);
        };

        var onMove = (e) => {
            if (!drawing) return;
            var pos = getPos(e);
            draw(pos.x, pos.y);
        };

        var onEnd = () => { drawing = false; };

        c.addEventListener('mousedown', onStart);
        c.addEventListener('touchstart', onStart, {passive: false});
        window.addEventListener('mousemove', onMove);
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('mouseup', onEnd);
        window.addEventListener('touchend', onEnd);

        document.getElementById('zoomRange').oninput = (e) => {
            const val = e.target.value;
            c.style.width = val + 'px';
            c.style.height = val + 'px';
            document.getElementById('zoom-val').innerText = Math.round((val/512)*100) + '%';
            renderNodes();
        };

        document.getElementById('fileBtn').onclick = (e) => { 
            e.stopPropagation(); 
            menu.classList.toggle('hidden'); 
        };
        document.addEventListener('click', () => menu.classList.add('hidden'));
        loader.onchange = handleAudio;

        updateCalendarDisplay();
        setInterval(updateCalendarDisplay, 1000);
    }

    function toggleGrid() {
        const grid = document.getElementById('grid-overlay');
        const isVisible = grid.style.display === 'block';
        grid.style.display = isVisible ? 'none' : 'block';
        document.getElementById('gridBtn').innerText = isVisible ? 'Grid: Off' : 'Grid: On';
    }

    function placeText(x, y) {
        const txt = prompt("Enter pixel text:");
        if (!txt) return;
        ctx.fillStyle = document.getElementById('colorPicker').value;
        ctx.font = "bold 12px 'Tahoma'";
        ctx.textBaseline = 'middle';
        ctx.fillText(txt, x, y);
        flash("Text Placed");
    }

    function applyFilter(f) {
        const imgData = ctx.getImageData(0,0,G,G);
        const data = imgData.data;
        for (let i = 0; i < data.length; i += 4) {
            if (f === 'grey') {
                const avg = (data[i] + data[i+1] + data[i+2]) / 3;
                data[i] = data[i+1] = data[i+2] = avg;
            } else if (f === 'invert') {
                data[i] = 255 - data[i];
                data[i+1] = 255 - data[i+1];
                data[i+2] = 255 - data[i+2];
            }
        }
        ctx.putImageData(imgData, 0, 0);
        flash("Filter Applied");
    }

    function flipCanvas() {
        const temp = document.createElement('canvas');
        temp.width = G; temp.height = G;
        const tctx = temp.getContext('2d');
        tctx.translate(G, 0);
        tctx.scale(-1, 1);
        tctx.drawImage(c, 0, 0);
        ctx.clearRect(0,0,G,G);
        ctx.drawImage(temp, 0, 0);
        flash("Flipped Horizontal");
    }

    function rotateCanvas() {
        const temp = document.createElement('canvas');
        temp.width = G; temp.height = G;
        const tctx = temp.getContext('2d');
        tctx.translate(G/2, G/2);
        tctx.rotate(Math.PI / 2);
        tctx.drawImage(c, -G/2, -G/2);
        ctx.clearRect(0,0,G,G);
        ctx.drawImage(temp, 0, 0);
        flash("Rotated 90°");
    }

    function setQuickColor(hex) {
        document.getElementById('colorPicker').value = hex;
        flash("Color: " + hex);
    }

    function changeTool(t) {
        tool = t;
        document.querySelectorAll('.xp-button').forEach(b => b.classList.remove('active'));
        var activeBtn = document.getElementById('btn-'+t);
        if(!activeBtn && t === 'text') activeBtn = document.getElementById('btn-text-logo');
        
        if(activeBtn) activeBtn.classList.add('active');
        document.getElementById('mode-text').innerText = t.toUpperCase();
        layer.style.opacity = (t === 'play' || t === 'audio') ? "1" : "0.2";
    }

    function draw(x, y) {
        if (tool === 'brush' || tool === 'eraser') {
            ctx.fillStyle = tool === 'eraser' ? '#fff' : document.getElementById('colorPicker').value;
            ctx.fillRect(x, y, 1, 1);
        } else if (tool === 'dither') {
            if ((x + y) % 2 === 0) {
                ctx.fillStyle = document.getElementById('colorPicker').value;
                ctx.fillRect(x, y, 1, 1);
            }
        }
    }

    function flood(x, y) {
        var targetData = ctx.getImageData(x, y, 1, 1).data;
        var fillColor = document.getElementById('colorPicker').value;
        var r = parseInt(fillColor.slice(1,3), 16);
        var g = parseInt(fillColor.slice(3,5), 16);
        var b = parseInt(fillColor.slice(5,7), 16);
        if (targetData[0] === r && targetData[1] === g && targetData[2] === b) return;
        var img = ctx.getImageData(0,0,G,G);
        var d = img.data;
        var stack = [[x,y]];
        while (stack.length) {
            var curr = stack.pop();
            var cx = curr[0], cy = curr[1];
            var i = (cy * G + cx) * 4;
            if (d[i] === targetData[0] && d[i+1] === targetData[1] && d[i+2] === targetData[2]) {
                d[i] = r; d[i+1] = g; d[i+2] = b; d[i+3] = 255;
                if (cx > 0) stack.push([cx-1, cy]);
                if (cx < G-1) stack.push([cx+1, cy]);
                if (cy > 0) stack.push([cx, cy-1]);
                if (cy < G-1) stack.push([cx, cy+1]);
            }
        }
        ctx.putImageData(img, 0, 0);
    }

    async function handleAudio(e) {
        var file = e.target.files[0];
        if (!file) return;
        flash("Decoding...");
        var buffer = await file.arrayBuffer();
        if (!aCtx) aCtx = new (window.AudioContext || window.webkitAudioContext)();
        aBuf = await aCtx.decodeAudioData(buffer);
        document.getElementById('audio-status').classList.remove('hidden');
        flash("Audio Ready");
    }

    function addNode(x, y) {
        if (!aBuf) return flash("Load Audio first!");
        nodes.push({x, y});
        renderNodes();
    }

    function renderNodes() {
        layer.innerHTML = '';
        var rect = c.getBoundingClientRect();
        var scale = rect.width / G;
        nodes.forEach(n => {
            var d = document.createElement('div');
            d.className = 'audio-marker';
            d.style.left = (n.x * scale + scale/2) + 'px';
            d.style.top = (n.y * scale + scale/2) + 'px';
            layer.appendChild(d);
        });
    }

    function playNode(x, y) {
        var hit = nodes.find(n => Math.abs(n.x - x) <= 3 && Math.abs(n.y - y) <= 3);
        if (hit && aBuf && aCtx) {
            var source = aCtx.createBufferSource();
            source.buffer = aBuf;
            source.connect(aCtx.destination);
            source.start(0);
            flash("Sound Triggered");
        }
    }

    function updateCalendarDisplay() {
        const now = new Date();
        const dateEl = document.getElementById('cal-date');
        if(!dateEl) return;
        dateEl.innerText = now.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        document.getElementById('cal-time').innerText = now.toLocaleTimeString();
        const grid = document.getElementById('cal-grid');
        grid.innerHTML = '';
        const first = new Date(now.getFullYear(), now.getMonth(), 1).getDay();
        const days = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
        for(let i=1; i<=days; i++) {
            const isToday = i === now.getDate();
            grid.innerHTML += `<div class="${isToday ? 'bg-blue-600 text-white rounded-full' : ''}">${i}</div>`;
        }
    }

    function updateTheme(type) {
        const bgMap = {
            wood: 'https://i.postimg.cc/hfr3mtyg/beautiful-wood-background-with-text-space-free-vector.jpg',
            studio: 'https://i.postimg.cc/ZvT55LKZ/black-room-background-abstract-with-gradient-in-empty-room-studio-black-background-product-show-digi.jpg',
            bliss: 'https://i.postimg.cc/9wWQQBFF/images-(48).jpg'
        };
        document.body.style.backgroundImage = `url('${bgMap[type]}')`;
        flash("Theme: " + type.toUpperCase());
    }

    function flash(text) {
        var m = document.getElementById('msg');
        m.innerText = text; m.style.opacity = '1';
        setTimeout(() => m.style.opacity = '0', 1500);
    }

    function resetCanvas() {
        ctx.fillStyle = "#fff"; ctx.fillRect(0,0,G,G);
        nodes = []; renderNodes();
        flash("Project Reset!");
    }

    function saveArt() {
        var link = document.createElement('a');
        link.download = 'pixelart.png';
        link.href = c.toDataURL();
        link.click();
    }

    function toggleCalendar() {
        var modal = document.getElementById('calendarModal');
        modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
    }

    function openAudio() { loader.click(); }

    window.onload = start;
</script>
</body>
</html>
